name: Auto Blog Index

on:
  push:
    branches: [ main ]
    paths:
      - 'posts/**.md'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate README
        run: |
          # 1. 设置 README 头部
          echo "# 我的代码博客" > README.md
          echo "> 记录成长，分享学习。此目录由 GitHub Actions 自动更新。" >> README.md
          echo "" >> README.md
          echo "## 📂 文章归档" >> README.md

          # 2. 递归查找 posts 文件夹下的 md 文件，按路径倒序排列
          curr_y=""
          curr_m=""
          
          find posts -name "*.md" | sort -r | while read -r path; do
            # 提取年份和月份 (假设路径为 posts/2026/03/文件名.md)
            year=$(echo "$path" | cut -d'/' -f2)
            month=$(echo "$path" | cut -d'/' -f3)

            # 年份分级 (一级列表)
            if [ "$year" != "$curr_y" ]; then
              echo "- **$year 年**" >> README.md
              curr_y=$year
              curr_m="" # 跨年重置月份
            fi

            # 月份分级 (二级列表，缩进 2 空格)
            if [ "$month" != "$curr_m" ]; then
              echo "  - **$month 月**" >> README.md
              curr_m=$month
            fi

            # 文章标题 (三级列表，缩进 4 空格)
            # 优先提取文件内的一级标题，如果没有则使用文件名
            title=$(grep -m 1 '^# ' "$path" | sed 's/^# //')
            [ -z "$title" ] && title=$(basename "$path" .md)
            
            echo "    - [$title]($path)" >> README.md
          done

          echo "" >> README.md
          echo "---" >> README.md
          echo "最后更新于: $(date +'%Y-%m-%d %H:%M') (UTC)" >> README.md

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: 自动更新博客目录结构" && git push)